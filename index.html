<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>HappyKaang</title>
  <script src="https://cdn.jsdelivr.net/npm/epubjs/dist/epub.min.js">
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fafafa;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      transition: background 0.2s ease;
    }

    .container {
      max-width: 520px;
      width: 100%;
      background: #ffffff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 10px 25px -8px rgba(0, 0, 0, 0.04), 0 4px 10px -6px rgba(0, 0, 0, 0.02);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
      transition: all 0.25s;
    }

    .reader-wrapper {
      width: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .reader-wrapper.active {
      display: flex;
    }

    .viewer {
      width: 100%;
      height: 70vh;
      max-height: 650px;
      border: 1px solid #eaeaea;
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.02);
      overflow: hidden;
      position: relative;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.8rem;
      margin-top: 0.5rem;
    }

    .btn-icon {
      background: #f5f5f5;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #2c2c2c;
      transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-icon:active {
      transform: scale(0.95);
      background: #e0e0e0;
    }

    .btn-icon:hover {
      background: #ebebeb;
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.04);
    }

    .btn-icon:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-indicator {
      font-size: 0.9rem;
      color: #666;
      font-weight: 500;
      min-width: 70px;
      text-align: center;
      letter-spacing: 0.3px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.8rem 1.8rem;
      border-radius: 40px;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.3px;
      cursor: pointer;
      border: none;
      background: #f0f0f0;
      color: #1a1a1a;
      transition: all 0.2s ease;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-primary {
      background: #1a1a1a;
      color: #ffffff;
      box-shadow: 0 8px 16px -6px rgba(0, 0, 0, 0.1);
    }

    .btn-primary:hover {
      background: #2c2c2c;
      transform: translateY(-1px);
      box-shadow: 0 12px 22px -8px rgba(0, 0, 0, 0.15);
    }

    .btn-secondary {
      background: #ffffff;
      border: 1px solid #e0e0e0;
    }

    .btn-secondary:hover {
      background: #f7f7f7;
      border-color: #ccc;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      justify-content: center;
    }

    .book-title {
      font-size: 2rem;
      font-weight: 620;
      letter-spacing: -0.5px;
      color: #111;
      line-height: 1.3;
    }

    .book-meta {
      font-size: 0.9rem;
      color: #888;
      margin-top: -0.8rem;
    }

    .divider {
      width: 32px;
      height: 3px;
      background: #e0e0e0;
      border-radius: 3px;
      margin: 0.2rem 0;
    }

    .file-input-label {
      cursor: pointer;
    }

    #fileInput {
      display: none;
    }

    @media (max-width: 480px) {
      .container {
        padding: 2rem 1.2rem;
      }
      .book-title {
        font-size: 1.7rem;
      }
      .viewer {
        height: 60vh;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="mainCard">
    <div class="book-title" id="bookNameDisplay">📖 我的作品</div>
    <div class="divider"></div>
    <div class="book-meta" id="fileNameDisplay">未选择文件</div>

    <div class="btn-group" id="actionButtons">
      <button class="btn btn-primary" id="readOnlineBtn">
        <span>📖</span> 在线阅读
      </button>
      <a class="btn btn-secondary" id="downloadBtn" href="#" download>
        <span>⬇️</span> 下载 EPUB
      </a>
      <label class="btn btn-secondary file-input-label" for="fileInput">
        <span>📂</span> 打开本地文件
      </label>
      <input type="file" id="fileInput" accept=".epub">
    </div>

    <div class="reader-wrapper" id="readerWrapper">
      <div class="viewer" id="viewer"></div>
      <div class="controls">
        <button class="btn-icon" id="prevBtn" title="上一页">←</button>
        <span class="page-indicator" id="pageIndicator">- / -</span>
        <button class="btn-icon" id="nextBtn" title="下一页">→</button>
      </div>
      <button class="btn btn-secondary" id="closeReaderBtn" style="margin-top:0.4rem;">
        ✕ 关闭阅读器
      </button>
    </div>
  </div>

  <script>
    (function() {
      // 默认 EPUB 文件路径（请修改为你的实际文件路径）
      const DEFAULT_EPUB_PATH = '2026_古典名句单向历_分散版.epub';  // 指向上传的EPUB文件

      const bookNameDisplay = document.getElementById('bookNameDisplay');
      const fileNameDisplay = document.getElementById('fileNameDisplay');
      const readOnlineBtn = document.getElementById('readOnlineBtn');
      const downloadBtn = document.getElementById('downloadBtn');
      const fileInput = document.getElementById('fileInput');
      const readerWrapper = document.getElementById('readerWrapper');
      const viewerElem = document.getElementById('viewer');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const pageIndicator = document.getElementById('pageIndicator');
      const closeReaderBtn = document.getElementById('closeReaderBtn');

      let currentBookUrl = DEFAULT_EPUB_PATH;
      let book = null;
      let rendition = null;
      let locations = null; // 存储书籍位置信息
      let currentLocationIndex = 0;

      // 设置默认文件信息
      function setDefaultFileInfo() {
        const fileName = currentBookUrl.split('/').pop() || 'my-book.epub';
        fileNameDisplay.textContent = fileName;
        downloadBtn.href = currentBookUrl;
        downloadBtn.download = fileName;
        const bookName = fileName.replace(/\.epub$/i, '').replace(/[-_]/g, ' ');
        bookNameDisplay.textContent = bookName || '📖 我的作品';
      }

      // 更新页码显示
      function updatePageDisplay() {
        if (locations && locations.length > 0) {
          const total = locations.length;
          const current = currentLocationIndex + 1;
          pageIndicator.textContent = `${current} / ${total}`;
          
          // 更新按钮状态
          prevBtn.disabled = currentLocationIndex <= 0;
          nextBtn.disabled = currentLocationIndex >= total - 1;
        } else {
          pageIndicator.textContent = '- / -';
        }
      }

      // 彻底销毁阅读器
      function destroyReader() {
        if (rendition) {
          try {
            rendition.destroy();
          } catch (e) {
            console.warn('销毁 rendition 时出错:', e);
          }
          rendition = null;
        }
        if (book) {
          try {
            book.destroy();
          } catch (e) {
            console.warn('销毁 book 时出错:', e);
          }
          book = null;
        }
        locations = null;
        currentLocationIndex = 0;
        viewerElem.innerHTML = '';
        readerWrapper.classList.remove('active');
        pageIndicator.textContent = '- / -';
        prevBtn.disabled = false;
        nextBtn.disabled = false;
      }

      // 使用 CFI 进行翻页
      function navigateToLocation(index) {
        if (!rendition || !locations || locations.length === 0) return;
        
        if (index >= 0 && index < locations.length) {
          currentLocationIndex = index;
          rendition.display(locations[index]).then(() => {
            updatePageDisplay();
          }).catch(err => {
            console.warn('跳转到位置失败:', err);
          });
        }
      }

      // 加载并渲染 EPUB
      function loadEpub(url) {
        destroyReader();

        // 创建 Book 实例
        book = ePub(url, { 
          openAs: 'epub',
          restore: false 
        });

        // 等待书籍加载完成
        book.ready.then(() => {
          // 生成位置信息
          return book.locations.generate(150);
        }).then((generatedLocations) => {
          locations = generatedLocations;
          
          // 创建渲染器
          rendition = book.renderTo(viewerElem, {
            width: '100%',
            height: '100%',
            spread: 'none',
            flow: 'paginated',
            manager: 'default'
          });

          // 从第一个位置开始显示
          currentLocationIndex = 0;
          return rendition.display(locations[0]);
        }).then(() => {
          updatePageDisplay();
          
          // 监听渲染位置变化（用于同步页码）
          if (rendition) {
            rendition.on('relocated', function(location) {
              if (locations && location.start && location.start.cfi) {
                // 查找当前 CFI 在 locations 中的位置
                const currentCfi = location.start.cfi;
                for (let i = 0; i < locations.length; i++) {
                  if (locations[i] === currentCfi || 
                      (typeof locations[i] === 'string' && locations[i].includes(currentCfi))) {
                    currentLocationIndex = i;
                    updatePageDisplay();
                    break;
                  }
                }
              }
            });
          }
          
          // 显示阅读器
          readerWrapper.classList.add('active');
        }).catch(err => {
          console.error('加载 EPUB 失败:', err);
          alert('无法加载 EPUB 文件。请检查文件路径是否正确，或文件是否有效。\n\n错误信息: ' + err.message);
          destroyReader();
        });
      }

      // 翻页函数
      function goToPrev() {
        if (!rendition || !locations || locations.length === 0) return;
        if (currentLocationIndex > 0) {
          navigateToLocation(currentLocationIndex - 1);
        }
      }

      function goToNext() {
        if (!rendition || !locations || locations.length === 0) return;
        if (currentLocationIndex < locations.length - 1) {
          navigateToLocation(currentLocationIndex + 1);
        }
      }

      // 关闭阅读器
      function closeReader() {
        destroyReader();
      }

      // 处理文件上传
      function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        if (!file.name.toLowerCase().endsWith('.epub')) {
          alert('请选择 .epub 格式的文件。');
          return;
        }

        const url = URL.createObjectURL(file);
        currentBookUrl = url;
        fileNameDisplay.textContent = file.name;
        const bookName = file.name.replace(/\.epub$/i, '').replace(/[-_]/g, ' ');
        bookNameDisplay.textContent = bookName || '📖 我的作品';
        downloadBtn.href = url;
        downloadBtn.download = file.name;

        loadEpub(url);
        fileInput.value = '';
      }

      // 事件绑定
      readOnlineBtn.addEventListener('click', () => {
        loadEpub(currentBookUrl);
      });

      prevBtn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        goToPrev();
      });

      nextBtn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        goToNext();
      });

      closeReaderBtn.addEventListener('click', closeReader);
      fileInput.addEventListener('change', handleFileSelect);

      // 键盘快捷键
      document.addEventListener('keydown', (e) => {
        if (!readerWrapper.classList.contains('active')) return;
        
        if (e.key === 'ArrowLeft') {
          e.preventDefault();
          goToPrev();
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          goToNext();
        } else if (e.key === 'Escape') {
          e.preventDefault();
          closeReader();
        }
      });

      // 触摸滑动支持
      let touchStartX = 0;
      viewerElem.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
      }, { passive: true });

      viewerElem.addEventListener('touchend', (e) => {
        if (!readerWrapper.classList.contains('active')) return;
        const touchEndX = e.changedTouches[0].clientX;
        const diff = touchStartX - touchEndX;
        
        if (Math.abs(diff) > 50) {
          if (diff > 0) {
            goToNext();
          } else {
            goToPrev();
          }
        }
      });

      // 页面卸载时清理
      window.addEventListener('beforeunload', () => {
        destroyReader();
      });

      // 初始化
      setDefaultFileInfo();

      if (DEFAULT_EPUB_PATH === 'my-book.epub') {
        console.log('📘 简约 EPUB 阅读器已启动。');
        console.log('   默认路径: ' + DEFAULT_EPUB_PATH);
        console.log('   使用方法：');
        console.log('   1) 修改代码中的 DEFAULT_EPUB_PATH 变量为你的文件路径');
        console.log('   2) 或将你的 EPUB 文件放在同目录下并命名为 my-book.epub');
        console.log('   3) 点击"打开本地文件"按钮直接上传 EPUB');
      }
    })();
  </script>
</body>
</html>
