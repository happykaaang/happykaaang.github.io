<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>我的作品 · 简约阅读</title>
  <!-- 引入 epub.js 核心库 -->
  <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .book-title {
      font-size: 1.8rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 0.5rem;
      color: #222;
    }

    .book-meta {
      text-align: center;
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 1.5rem;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .btn {
      padding: 0.7rem 1.4rem;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    .btn-primary {
      background: #1a1a1a;
      color: white;
    }

    .btn-primary:hover {
      background: #333;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #1a1a1a;
      border: 1px solid #ddd;
    }

    .btn-secondary:hover {
      background: #e8e8e8;
    }

    .reader-container {
      display: none;
    }

    .reader-container.active {
      display: block;
    }

    #viewer {
      width: 100%;
      height: 60vh;
      max-height: 500px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 1rem;
      background: white;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .btn-nav {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: #f0f0f0;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .btn-nav:hover:not(:disabled) {
      background: #e0e0e0;
    }

    .btn-nav:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .page-info {
      min-width: 80px;
      text-align: center;
      font-size: 0.9rem;
      color: #666;
    }

    .btn-close {
      width: 100%;
    }

    #fileInput {
      display: none;
    }

    @media (max-width: 480px) {
      .container {
        padding: 1.5rem 1rem;
      }
      
      .book-title {
        font-size: 1.4rem;
      }

      #viewer {
        height: 50vh;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="book-title" id="bookTitle">📖 我的作品</div>
    <div class="book-meta" id="bookMeta">未选择文件</div>

    <div class="btn-group">
      <button class="btn btn-primary" id="readBtn">📖 在线阅读</button>
      <a class="btn btn-secondary" id="downloadBtn" download>⬇️ 下载</a>
      <label class="btn btn-secondary" for="fileInput" style="cursor: pointer; margin: 0;">📂 打开文件</label>
      <input type="file" id="fileInput" accept=".epub">
    </div>

    <div class="reader-container" id="reader">
      <div id="viewer"></div>
      <div class="controls">
        <button class="btn-nav" id="prevBtn" title="上一页">←</button>
        <span class="page-info" id="pageInfo">加载中...</span>
        <button class="btn-nav" id="nextBtn" title="下一页">→</button>
      </div>
      <button class="btn btn-secondary btn-close" id="closeBtn">✕ 关闭</button>
    </div>
  </div>

  <script>
    const EPUB_PATH = '2026_古典名句单向历_��散版.epub';

    let book = null;
    let rendition = null;
    let currentIndex = 0;
    let chapters = [];

    const ui = {
      title: document.getElementById('bookTitle'),
      meta: document.getElementById('bookMeta'),
      readBtn: document.getElementById('readBtn'),
      downloadBtn: document.getElementById('downloadBtn'),
      fileInput: document.getElementById('fileInput'),
      reader: document.getElementById('reader'),
      viewer: document.getElementById('viewer'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      pageInfo: document.getElementById('pageInfo'),
      closeBtn: document.getElementById('closeBtn')
    };

    function updateFileInfo(name) {
      ui.meta.textContent = name;
      ui.downloadBtn.download = name;
      const bookName = name.replace(/\.epub$/i, '').replace(/[-_]/g, ' ');
      ui.title.textContent = bookName || '📖 我的作品';
    }

    function updatePageInfo() {
      const total = chapters.length || 1;
      const current = currentIndex + 1;
      ui.pageInfo.textContent = `${current} / ${total}`;
      ui.prevBtn.disabled = currentIndex === 0;
      ui.nextBtn.disabled = currentIndex >= total - 1;
    }

    function cleanup() {
      if (rendition) {
        rendition.destroy();
        rendition = null;
      }
      if (book) {
        book.destroy();
        book = null;
      }
      chapters = [];
      currentIndex = 0;
      ui.viewer.innerHTML = '';
      ui.reader.classList.remove('active');
    }

    function openBook(url) {
      cleanup();
      ui.reader.classList.add('active');
      ui.pageInfo.textContent = '加载中...';

      try {
        book = ePub(url);

        book.ready.then(() => {
          const spine = book.spine;
          chapters = spine.spineItems || [];
          if (chapters.length === 0 && spine.items) {
            chapters = spine.items;
          }
          
          console.log('总章节数:', chapters.length);

          rendition = book.renderTo('viewer', {
            width: '100%',
            height: '100%',
            flow: 'paginated',
            spread: 'none'
          });

          currentIndex = 0;
          if (chapters.length > 0) {
            return rendition.display(chapters[0].href);
          }
          return rendition.display();
        }).then(() => {
          updatePageInfo();
          console.log('✅ 阅读器已就绪');
        }).catch(err => {
          console.error('错误:', err);
          alert('加载失败: ' + err.message);
          cleanup();
        });

      } catch (err) {
        console.error('初始化错误:', err);
        alert('初始化失败: ' + err.message);
        cleanup();
      }
    }

    function nextPage() {
      if (!rendition || currentIndex >= chapters.length - 1) return;
      currentIndex++;
      rendition.display(chapters[currentIndex].href).then(() => {
        updatePageInfo();
      }).catch(err => console.warn('翻页错误:', err));
    }

    function prevPage() {
      if (!rendition || currentIndex <= 0) return;
      currentIndex--;
      rendition.display(chapters[currentIndex].href).then(() => {
        updatePageInfo();
      }).catch(err => console.warn('翻页错误:', err));
    }

    // 事件绑定
    ui.readBtn.addEventListener('click', () => {
      openBook(ui.downloadBtn.href || EPUB_PATH);
    });

    ui.prevBtn.addEventListener('click', prevPage);
    ui.nextBtn.addEventListener('click', nextPage);
    ui.closeBtn.addEventListener('click', cleanup);

    ui.fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      if (!file.name.toLowerCase().endsWith('.epub')) {
        alert('请选择 EPUB 文件');
        return;
      }

      const url = URL.createObjectURL(file);
      ui.downloadBtn.href = url;
      updateFileInfo(file.name);
      openBook(url);
      ui.fileInput.value = '';
    });

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
      if (!ui.reader.classList.contains('active')) return;
      if (e.key === 'ArrowRight') {
        e.preventDefault();
        nextPage();
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        prevPage();
      } else if (e.key === 'Escape') {
        cleanup();
      }
    });

    // 初始化
    updateFileInfo('2026_古典名句单向历_分散版.epub');
    ui.downloadBtn.href = EPUB_PATH;
  </script>
</body>
</html>
